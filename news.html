---
layout: main
title: News
---
<h1>Recent News</h1>
<p>Release announcements and project updates. <a href="/atom.xml">Atom Feed &rarr;</a></p>

<div class="news-list">
  {% for post in site.posts %}
  <div class="news-list-item">
    <span class="news-list-date">{{ post.date | date: "%b %-d, %Y" }}</span>
    <span class="news-list-title"><a href="{{ post.url }}">{{ post.title }}</a></span>
  </div>
  {% endfor %}
</div>
